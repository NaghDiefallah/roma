name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0
  workflow_dispatch:  # Allows manual triggering
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, x86]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: dotnet restore Roma/Roma.csproj

    - name: Build and Publish
      run: |
        dotnet publish Roma/Roma.csproj `
          -c Release `
          -r win-${{ matrix.platform }} `
          -p:Platform=${{ matrix.platform }} `
          -p:PublishSingleFile=true `
          -p:SelfContained=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:EnableCompressionInSingleFile=true `
          -p:RuntimeIdentifierOverride=win-${{ matrix.platform }} `
          -o publish/Roma-${{ matrix.platform }}

    - name: Upload single executable
      uses: actions/upload-artifact@v4
      with:
        name: Roma-${{ matrix.platform }}
        path: publish/Roma-${{ matrix.platform }}/Roma.exe
        retention-days: 5

  release:
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Rename executables
      run: |
        Move-Item artifacts/Roma-x64/Roma.exe artifacts/Roma-x64.exe
        Move-Item artifacts/Roma-x86/Roma.exe artifacts/Roma-x86.exe
      shell: pwsh

    - name: Get version
      id: get_version
      run: |
        if ("${{ github.event_name }}" -eq "workflow_dispatch") {
          $version = "${{ github.event.inputs.version }}"
        } else {
          $version = "${{ github.ref_name }}" -replace '^v', ''
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "tag=v$version" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_version.outputs.tag }}
        name: Roma v${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false
        generate_release_notes: true
        files: |
          artifacts/Roma-x64.exe
          artifacts/Roma-x86.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
